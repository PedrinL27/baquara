{% extends "base/base.html" %}

{% block content %}

<h1>{{ categoria.nome }}</h1>

<div class="conteudos">

{% for conteudo in conteudos %}

    <a href="/conteudo/{{ conteudo.slug }}">
        <div class="card">

            <h3>{{ conteudo.titulo }}</h3>

            <p>{{ conteudo.resumo }}</p>

        </div>
    </a>

{% empty %}

<p>Nenhum conteúdo nesta categoria.</p>

{% endfor %}

</div>

{% endblock %}
