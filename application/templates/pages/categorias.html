{% extends "base/base.html" %}

<title>{% block title %}Categorias{% endblock %}</title>

{% block content %} 

<div class="cards">

    {% for categoria in categorias %}

    <a href="{% url 'categoria_detail' categoria.slug %}" class="card-link">
        <div class="card">
            <i class="bi {{ categoria.icone }}"></i>
            <h3>{{ categoria.nome }}</h3>
        </div>
    </a>

    {% endfor %}

</div>

{% endblock %}
