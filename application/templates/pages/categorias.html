{% extends "base/base.html" %}

{% block content %}

<div class="cards">

    {% for categoria in categorias %}

    <a href="/categoria/{{ categoria.slug }}" class="card-link">
        <div class="card">
            <h3>{{ categoria.nome }}</h3>
            {% if categoria.descricao_resumida %}
            <p>{{ categoria.descricao_resumida}}</p>
            {% endif %}
        </div>
    </a>

    {% endfor %}

</div>

{% endblock %}
