{% load static %}

<header class="navbar">
  <div class="container navbar-inner">

    <div class="logo">
      <a href="/">
        <img id="logo-img"
             src="{% static 'img/logo-light.png' %}"
             data-light="{% static 'img/logo-light.png' %}"
             data-dark="{% static 'img/logo-dark.png' %}"
             alt="Baquara">
      </a>
    </div>

    <nav class="nav-links" id="nav-links">
      <a href="/categorias">Categorias</a>
      <a href="/manifesto">Manifesto</a>
      <a href="/sobre">Sobre</a>
    </nav>

  </div>
</header>

<script>
function atualizarLogo() {
    const logo = document.getElementById("logo-img");
    const darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
    logo.src = darkMode ? logo.dataset.dark : logo.dataset.light;
}
atualizarLogo();
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", atualizarLogo);
</script>
