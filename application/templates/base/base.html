{% load static %}

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">


</head>

<title>{% block title %}Baquara{% endblock %}</title>

<link rel="icon" href="{% static 'img/favicon-light.png' %}" media="(prefers-color-scheme: light)">
<link rel="icon" href="{% static 'img/favicon-dark.png' %}" media="(prefers-color-scheme: dark)">

<body>

{% include "components/navbar.html" %}


<div class="container">
{% block content %}
{% endblock %}
</div>


{% include "components/footer.html" %}

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/django.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('pre code').forEach(el => {
        hljs.highlightElement(el);
      });
    });
  </script>

</body>
</html>
